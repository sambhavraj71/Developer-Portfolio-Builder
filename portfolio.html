<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - John Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .portfolio-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .portfolio-hero {
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            border-radius: var(--radius-xl);
            margin-bottom: 48px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .portfolio-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary)15, transparent 70%);
            border-radius: 50%;
        }

        .portfolio-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            box-shadow: var(--shadow-xl);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .portfolio-hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }

        .portfolio-hero .title {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .portfolio-hero .bio {
            color: var(--text-secondary);
            max-width: 500px;
            margin: 12px auto 0;
            font-size: 1.05rem;
            position: relative;
            z-index: 1;
        }

        .portfolio-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 40px;
            flex-wrap: wrap;
        }

        .portfolio-actions .btn-action {
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .portfolio-actions .btn-action:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .portfolio-actions .btn-action.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .portfolio-actions .btn-action.primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .portfolio-section {
            margin-bottom: 48px;
        }

        .portfolio-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 14px;
        }

        .portfolio-section h2 i {
            color: var(--primary);
        }

        .portfolio-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .portfolio-skill {
            background: var(--bg-secondary);
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: 0.3s;
        }

        .portfolio-skill:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .portfolio-skill .level {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 12px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .portfolio-projects {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .portfolio-project {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 28px;
            transition: all 0.3s;
        }

        .portfolio-project:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .portfolio-project h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .portfolio-project .tech {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
            background: var(--bg-secondary);
            padding: 2px 14px;
            border-radius: 50px;
        }

        .portfolio-project .desc {
            color: var(--text-secondary);
            margin: 14px 0 18px;
            line-height: 1.7;
        }

        .portfolio-project .project-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid var(--primary);
        }

        .portfolio-project .project-link:hover {
            background: var(--primary);
            color: #fff;
            gap: 14px;
        }

        .portfolio-experience {
            border-left: 4px solid var(--primary);
            padding-left: 28px;
            margin-bottom: 28px;
            transition: 0.3s;
        }

        .portfolio-experience:hover {
            padding-left: 32px;
        }

        .portfolio-experience h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .portfolio-experience .company {
            color: var(--primary);
            font-weight: 600;
        }

        .portfolio-experience .duration {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .portfolio-experience .desc {
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.7;
        }

        .resume-download {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-secondary);
            padding: 18px 28px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .resume-download:hover {
            border-color: var(--primary);
            background: var(--bg-primary);
            transform: translateX(4px);
        }

        .resume-download i {
            color: var(--primary);
            font-size: 2rem;
        }

        .resume-download .info .name {
            font-weight: 600;
        }

        .resume-download .info .hint {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 2px dashed var(--border-color);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .portfolio-footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .social-links a {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .edit-portfolio-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-xl);
            transition: 0.3s;
            z-index: 100;
            text-decoration: none;
        }

        .edit-portfolio-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        @media print {
            body {
                background: #fff !important;
                color: #000 !important;
            }

            .portfolio-wrapper {
                padding: 20px !important;
                max-width: 100% !important;
            }

            .portfolio-hero {
                background: #f8fafc !important;
                border: 1px solid #e2e8f0 !important;
                padding: 40px !important;
                box-shadow: none !important;
            }

            .portfolio-hero::before {
                display: none !important;
            }

            .portfolio-actions {
                display: none !important;
            }

            .edit-portfolio-btn {
                display: none !important;
            }

            .portfolio-project,
            .portfolio-skill,
            .experience-item {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                box-shadow: none !important;
                border: 1px solid #e2e8f0 !important;
            }

            .portfolio-section {
                break-inside: avoid !important;
            }

            .portfolio-section h2 {
                border-bottom: 2px solid #6c63ff !important;
            }

            .social-links a {
                border: 1px solid #e2e8f0 !important;
                background: #f8fafc !important;
                color: #333 !important;
            }

            .portfolio-project:hover {
                transform: none !important;
            }

            .resume-download {
                border: 1px solid #e2e8f0 !important;
                background: #f8fafc !important;
            }

            .empty-state {
                border: 1px dashed #ccc !important;
            }

            .portfolio-footer {
                border-top: 1px solid #e2e8f0 !important;
            }

            .portfolio-hero h1 {
                font-size: 2.5rem !important;
            }
        }

        @media (max-width: 768px) {
            .portfolio-hero {
                padding: 40px 20px;
            }
            .portfolio-hero h1 {
                font-size: 2rem;
            }
            .portfolio-projects {
                grid-template-columns: 1fr;
            }
            .portfolio-actions {
                flex-direction: column;
                align-items: center;
            }
            .edit-portfolio-btn {
                bottom: 16px;
                right: 16px;
                padding: 12px 18px;
                font-size: 0.85rem;
            }
            .portfolio-actions .btn-action {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .portfolio-wrapper {
                padding: 16px;
            }
            .portfolio-hero h1 {
                font-size: 1.6rem;
            }
            .portfolio-avatar {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="portfolio-wrapper" id="portfolioWrapper">
        <div class="portfolio-actions">
            <button class="btn-action" onclick="sharePortfolio()">
                <i class="fas fa-share-alt"></i> Share
            </button>
            <button class="btn-action" onclick="copyLink()">
                <i class="fas fa-link"></i> Copy Link
            </button>
            <button class="btn-action" onclick="window.print()">
                <i class="fas fa-print"></i> Print PDF
            </button>
            <button class="btn-action primary" onclick="downloadPortfolio()">
                <i class="fas fa-download"></i> Download Backup
            </button>
        </div>

        <div class="portfolio-hero" id="portfolioHero">
            <img id="portfolioAvatar" class="portfolio-avatar" src="https://via.placeholder.com/150/6c63ff/ffffff?text=Developer" alt="Profile" />
            <h1 id="portfolioName">John Developer</h1>
            <div class="title" id="portfolioTitle">Full Stack Developer</div>
            <p class="bio" id="portfolioBio">Passionate about building beautiful web applications</p>
        </div>

        <section class="portfolio-section">
            <h2><i class="fas fa-code"></i> Skills</h2>
            <div class="portfolio-skills" id="portfolioSkills"></div>
        </section>

        <section class="portfolio-section">
            <h2><i class="fas fa-project-diagram"></i> Projects</h2>
            <div class="portfolio-projects" id="portfolioProjects"></div>
        </section>

        <section class="portfolio-section">
            <h2><i class="fas fa-briefcase"></i> Experience</h2>
            <div id="portfolioExperience"></div>
        </section>

        <section class="portfolio-section">
            <h2><i class="fas fa-file-alt"></i> Resume</h2>
            <div id="portfolioResume"></div>
        </section>

        <footer class="portfolio-footer">
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-dev"></i></a>
            </div>
            <p>&copy; 2026 <span id="footerName">John Developer</span>. All rights reserved.</p>
            <p style="font-size: 0.85rem; margin-top: 4px;">Built with ❤️ using Portfolio Builder</p>
        </footer>
    </div>

    <a href="index.html" class="edit-portfolio-btn">
        <i class="fas fa-edit"></i> Edit Portfolio
    </a>

    <script src="portfolio.js"></script>
</body>
</html>
